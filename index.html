<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recipe Card Generator</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- PDF LIB -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body>

<div class="layout">

  <!-- EDITOR -->
  <div class="editor">
    <h1>Recipe Card Generator</h1>

    <label>Card size</label>
    <select id="size">
      <option value="a4">A4</option>
      <option value="a5">A5</option>
    </select>

    <label>Image</label>
    <input type="file" id="imageUpload">

    <label>Title</label>
    <input id="title">

    <div class="row">
      <div>
        <div class="editableLabel">
          <label id="servingsLabel">Servings</label>
          <button class="editIcon" onclick="editLabel('servingsLabel')">✎</button>
        </div>
        <input id="servings" placeholder="10">
      </div>

      <div>
        <div class="editableLabel">
          <label id="timeLabel">Time</label>
          <button class="editIcon" onclick="editLabel('timeLabel')">✎</button>
        </div>
        <input id="time" placeholder="30 minutes">
      </div>
    </div>

    <div class="editableLabel">
      <label id="ingredientsLabel">Ingredients</label>
      <button class="editIcon" onclick="editLabel('ingredientsLabel')">✎</button>
    </div>
    <textarea id="ingredients" placeholder="## Section
Item 1
Item 2"></textarea>

    <div class="editableLabel">
      <label id="instructionsLabel">Instructions</label>
      <button class="editIcon" onclick="editLabel('instructionsLabel')">✎</button>
    </div>
    <textarea id="instructions" placeholder="## Step group
Step 1
Step 2"></textarea>

    <div class="editableLabel">
      <label id="notesLabel">Notes</label>
      <button class="editIcon" onclick="editLabel('notesLabel')">✎</button>
    </div>
    <textarea id="notes"></textarea>

    <div class="buttons">
      <button onclick="clearAll()">Clear</button>
      <button onclick="window.print()">Print</button>
    </div>

    <!-- PDF MERGE -->
    <div class="pdfMergeBox">
      <label>Combine PDFs (2 per A4 page)</label>
      <input type="file" id="pdfFiles" accept="application/pdf" multiple>
      <button onclick="mergePdfsTwoPerPage()">Merge PDFs</button>
    </div>

  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div id="card" class="card a4">

      <div class="imageWrapper">
        <span id="imagePlaceholder">Add photo</span>
        <img id="pImage">
      </div>

      <div class="content">

        <h1 id="pTitle"></h1>

        <div class="metaRow">
          <span><span id="pServingsLabel">Servings</span>: <span id="pServings"></span></span>
          <span><span id="pTimeLabel">Time</span>: <span id="pTime"></span></span>
        </div>

        <hr class="divider">

        <div class="main">
          <div class="columns">

            <div class="ingredientsCol">
              <h2 id="pIngredientsLabel">Ingredients</h2>
              <div id="pIngredients"></div>
            </div>

            <div class="instructionsCol">
              <h2 id="pInstructionsLabel">Instructions</h2>
              <div id="pInstructions"></div>
            </div>

          </div>
        </div>

        <div class="notesSection">
          <h2 id="pNotesLabel">Notes</h2>
          <div id="pNotes"></div>
        </div>

      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
