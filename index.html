<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recipe Card Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <div class="editor">
    <h1>Recipe Card</h1>

    <label>Card size</label>
    <select id="size">
      <option value="a4">A4</option>
      <option value="a5">A5</option>
    </select>

    <label>Image</label>
    <input type="file" id="imageUpload">

    <label>Title</label>
    <input id="title">

    <div class="row">
      <div>
        <label>Servings</label>
        <input id="servings">
      </div>
      <div>
        <label>Time</label>
        <input id="time">
      </div>
    </div>

    <label>Ingredients (use ## for sub-headings)</label>
    <textarea id="ingredients"></textarea>

    <label>Instructions (use ## for sub-headings)</label>
    <textarea id="instructions"></textarea>

    <label>Notes</label>
    <textarea id="notes"></textarea>

    <div class="buttons">
      <button onclick="clearAll()">Clear</button>
      <button onclick="window.print()">Print</button>
    </div>
  </div>

  <div class="preview">
    <div id="card" class="card a4">

      <div class="imageWrapper">
        <span id="imagePlaceholder">Add photo</span>
        <img id="pImage">
      </div>

      <h1 id="pTitle"></h1>
      <div id="pMeta"></div>

      <h2>Ingredients</h2>
      <div id="pIngredients"></div>

      <h2>Instructions</h2>
      <div id="pInstructions"></div>

      <h2>Notes</h2>
      <div id="pNotes"></div>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
