<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recipe Card Generator</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <div class="editor">
    <h1>Recipe Card</h1>

    <label>Card size</label>
    <select id="size">
      <option value="a4">A4</option>
      <option value="a5">A5</option>
    </select>

    <label>Image</label>
    <input type="file" id="imageUpload">

    <label>Title</label>
    <input id="title">

    <div class="row">
      <div>
        <label>Servings</label>
        <input id="servings" placeholder="10">
      </div>
      <div>
        <label>Time</label>
        <input id="time" placeholder="30 minutes">
      </div>
    </div>

    <label>Ingredients (use ## for sub-headings)</label>
    <textarea id="ingredients"></textarea>

    <label>Instructions (use ## for sub-headings)</label>
    <textarea id="instructions"></textarea>

    <label>Notes</label>
    <textarea id="notes"></textarea>

    <div class="buttons">
      <button onclick="clearAll()">Clear</button>
      <button onclick="window.print()">Print</button>
    </div>
  </div>

  <div class="preview">
    <div id="card" class="card a4">

      <div class="imageWrapper">
        <span id="imagePlaceholder">Add photo</span>
        <img id="pImage">
      </div>

      <div class="content">

        <h1 id="pTitle"></h1>

        <div class="metaRow">
          <span>
            <span id="servingsLabel">Servings</span>: <span id="pServings"></span>
            <button class="editIcon" onclick="editLabel('servingsLabel')" title="Edit">✎</button>
          </span>

          <span>
            <span id="timeLabel">Time</span>: <span id="pTime"></span>
            <button class="editIcon" onclick="editLabel('timeLabel')" title="Edit">✎</button>
          </span>
        </div>

        <hr class="divider">

        <div class="main">
          <div class="columns">

            <div class="ingredientsCol">
              <div class="editableLabel">
                <h2 id="ingredientsLabel">Ingredients</h2>
                <button class="editIcon" onclick="editLabel('ingredientsLabel')" title="Edit">✎</button>
              </div>
              <div id="pIngredients"></div>
            </div>

            <div class="instructionsCol">
              <div class="editableLabel">
                <h2 id="instructionsLabel">Instructions</h2>
                <button class="editIcon" onclick="editLabel('instructionsLabel')" title="Edit">✎</button>
              </div>
              <div id="pInstructions"></div>
            </div>

          </div>
        </div>

        <div class="notesSection">
          <div class="editableLabel">
            <h2 id="notesLabel">Notes</h2>
            <button class="editIcon" onclick="editLabel('notesLabel')" title="Edit">✎</button>
          </div>
          <div id="pNotes"></div>
        </div>

      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
