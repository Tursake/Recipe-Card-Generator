<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recipe Card Generator</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="layout">

  <div class="editor">
    <h1>Recipe Card Generator</h1>

    <label>Image</label>
    <input type="file" id="imageUpload" accept="image/*">

    <label>Title</label>
    <input id="title">

    <div class="row">
      <div>
        <div class="editableLabel">
          <label id="servingsLabel">Servings</label>
          <button class="editIcon" onclick="editLabel('servingsLabel')" title="Edit">✎</button>
        </div>
        <input id="servings" placeholder="10">
      </div>

      <div>
        <div class="editableLabel">
          <label id="timeLabel">Time</label>
          <button class="editIcon" onclick="editLabel('timeLabel')" title="Edit">✎</button>
        </div>
        <input id="time" placeholder="30 minutes">
      </div>
    </div>

    <div class="editableLabel">
      <label id="ingredientsLabel">Ingredients</label>
      <button class="editIcon" onclick="editLabel('ingredientsLabel')" title="Edit">✎</button>
    </div>
    <textarea id="ingredients" placeholder="## Salad
Lettuce
Tomatoes

## Dressing
Olive oil
Lemon juice"></textarea>

    <div class="editableLabel">
      <label id="instructionsLabel">Instructions</label>
      <button class="editIcon" onclick="editLabel('instructionsLabel')" title="Edit">✎</button>
    </div>
    <textarea id="instructions" placeholder="## Salad
Chop ingredients
Mix together"></textarea>

    <div class="editableLabel">
      <label id="notesLabel">Notes</label>
      <button class="editIcon" onclick="editLabel('notesLabel')" title="Edit">✎</button>
    </div>
    <textarea id="notes"></textarea>

    <div class="buttons">
      <button onclick="clearAll()">Clear</button>
      <button onclick="window.print()">Print</button>
      <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <div class="pdfMergeBox">
      <h2>Combine recipe cards for A5 printing</h2>
      <p>
        Select multiple A4 recipe PDFs and combine them two-per-page on a single A4 sheet.
        Each recipe will be scaled to A5 size — perfect for printing and cutting.
      </p>

      <input type="file" id="pdfFiles" accept="application/pdf" multiple>
      <button onclick="mergePdfsTwoPerPage()">Merge PDFs</button>
    </div>
  </div>

  <div class="preview">
    <div id="card" class="card">

      <div class="imageWrapper">
        <span id="imagePlaceholder">Add photo</span>
        <img id="pImage">
      </div>

      <div class="content">

        <h1 id="pTitle"></h1>

        <div class="metaRow">
          <span><span id="pServingsLabel">Servings</span>: <span id="pServings"></span></span>
          <span><span id="pTimeLabel">Time</span>: <span id="pTime"></span></span>
        </div>

        <hr class="divider">

        <div class="main">
          <div class="columns">
            <div class="ingredientsCol">
              <h2 id="pIngredientsLabel">Ingredients</h2>
              <div id="pIngredients"></div>
            </div>

            <div class="instructionsCol">
              <h2 id="pInstructionsLabel">Instructions</h2>
              <div id="pInstructions"></div>
            </div>
          </div>
        </div>

        <div class="notesSection">
          <h2 id="pNotesLabel">Notes</h2>
          <div id="pNotes"></div>
        </div>

      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
