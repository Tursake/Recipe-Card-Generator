<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recipe Card Generator</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <!-- EDITOR -->
  <div class="editor">
    <h1>Recipe Card Generator</h1>

    <label>Card size</label>
    <select id="size">
      <option value="a4">A4</option>
      <option value="a5">A5</option>
    </select>

    <label>Image</label>
    <input type="file" id="imageUpload">

    <label>Title</label>
    <input id="title">

    <div class="row">
      <div>
        <label>Servings</label>
        <input id="servings" placeholder="10">
      </div>
      <div>
        <label>Time</label>
        <input id="time" placeholder="30 minutes">
      </div>
    </div>

    <!-- LABEL EDITING -->
    <label>Servings label</label>
    <input id="servingsLabelInput" value="Servings">

    <label>Time label</label>
    <input id="timeLabelInput" value="Time">

    <label>Ingredients label</label>
    <input id="ingredientsLabelInput" value="Ingredients">

    <label>Instructions label</label>
    <input id="instructionsLabelInput" value="Instructions">

    <label>Notes label</label>
    <input id="notesLabelInput" value="Notes">

    <label>Ingredients (use ## for sub-headings)</label>
    <textarea id="ingredients"></textarea>

    <label>Instructions (use ## for sub-headings)</label>
    <textarea id="instructions"></textarea>

    <label>Notes</label>
    <textarea id="notes"></textarea>

    <div class="buttons">
      <button onclick="clearAll()">Clear</button>
      <button onclick="window.print()">Print</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div id="card" class="card a4">

      <div class="imageWrapper">
        <span id="imagePlaceholder">Add photo</span>
        <img id="pImage">
      </div>

      <div class="content">

        <h1 id="pTitle"></h1>

        <div class="metaRow">
          <span><span id="servingsLabel"></span>: <span id="pServings"></span></span>
          <span><span id="timeLabel"></span>: <span id="pTime"></span></span>
        </div>

        <hr class="divider">

        <div class="main">
          <div class="columns">

            <div class="ingredientsCol">
              <h2 id="ingredientsLabel"></h2>
              <div id="pIngredients"></div>
            </div>

            <div class="instructionsCol">
              <h2 id="instructionsLabel"></h2>
              <div id="pInstructions"></div>
            </div>

          </div>
        </div>

        <div class="notesSection">
          <h2 id="notesLabel"></h2>
          <div id="pNotes"></div>
        </div>

      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
